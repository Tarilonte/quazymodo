<form
  class="
    flex items-center
    {{ environment-badge-form-class }}
    p-1
    rounded-full
  "
  hx-post="/environment"
  hx-trigger="change from:#environmentSelector-toggle"
  hx-swap="none"
>
  <input
    type="hidden"
    name="csrf-token"
    value="{{ csrf-token }}"
  >
  <input
    type="hidden"
    name="environment"
    value="development"
  >
  <label
    class="
      flex items-center
      text-xs font-semibold uppercase tracking-wide
    "
    for="environmentSelector-toggle"
  >
    <span
      class="
        badge badge-xs {{ environment-badge-class }}
      "
    >
      {{ environment-label }}
    </span>
    <input
      id="environmentSelector-toggle"
      class="
        toggle toggle-warning toggle-sm
      "
      type="checkbox"
      name="environment"
      value="production"
      aria-label="Alternar ambiente da sessao"
      {{ production-checked }}
    >
  </label>
</form>
