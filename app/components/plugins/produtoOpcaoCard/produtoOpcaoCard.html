<!-- Card reutilizavel para opcao de personalizacao de produto -->
<label
  data-pintura-option
  data-option-name="{{ option-name }}"
  data-option-price="{{ option-price-number }}"
  data-option-image="{{ option-image }}"
  class="
    block cursor-pointer
  "
>
  <input
    type="radio"
    name="{{ option-radio-name }}"
    value="{{ option-value }}"
    class="
      sr-only
    "
  />

  <article
    data-option-card
    class="
      card
      h-full
      border border-base-300 bg-base-100 shadow-sm
      transition-all duration-200
      hover:-translate-y-1 hover:shadow-md
    "
  >
    <figure
      class="
        h-48 overflow-hidden
        border-b border-base-300
      "
    >
      <img
        src="{{ option-image }}"
        alt="{{ option-alt }}"
        loading="lazy"
        class="
          h-full w-full object-cover object-center
        "
      />
    </figure>

    <div
      class="
        card-body
        p-4
      "
    >
      <div
        class="
          flex items-start justify-between gap-2
        "
      >
        <h3
          class="
            text-base font-semibold
            text-base-content
          "
        >
          {{ option-title }}
        </h3>
        <span
          class="
            badge badge-outline badge-primary
            text-xs
          "
        >
          {{ option-price-display }}
        </span>
      </div>

      <p
        class="
          text-sm leading-relaxed
          text-base-content/80
        "
      >
        {{ option-description }}
      </p>

      <p
        class="
          text-xs uppercase tracking-[0.12em]
          text-base-content/60
        "
      >
        Cupula artesanal inclusa
      </p>
    </div>
  </article>
</label>
