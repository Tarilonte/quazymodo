<div 
  id="toasts_container"
  class="toast z-10"
>
  <div class="toast_message rounded-none p-10 hidden flex alert min-w-[300px] relative items-center gap-3">
    <span class="toast_icon mdi mdi-information-outline text-2xl leading-none shrink-0"></span>
    <span class="btn-close-toast mdi mdi-close absolute top-2 right-2 cursor-pointer"></span>
    <div class="toast_text block font-bold"></div>
    <div class="absolute bottom-0 left-0 w-full">
      <progress class="progress text-current block h-[2px] w-full" value="100" max="100"></progress>
    </div>
  </div>
</div>
