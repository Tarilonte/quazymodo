<!-- Secao full-screen de produto para o catalogo v2 -->
<section
  catalogo-v2-secao
  produto-secao
  class="
    catalogo-v2-secao
    {{ layout-class }}
  "
>
  <article
    class="
      catalogo-v2-card
    "
  >
    <div
      class="
        catalogo-v2-card-grid
      "
    >
      <figure
        class="
          catalogo-v2-media
        "
      >
        <img
          produto-imagem-fundo
          src="{{ image-src }}"
          alt="{{ title }}"
          loading="lazy"
          class="
            catalogo-v2-media-image
          "
        />
      </figure>

      <div
        class="
          catalogo-v2-content
        "
      >
        <h2
          produto-camada
          class="
            catalogo-v2-title
          "
        >
          {{ title }}
        </h2>

        <p
          produto-camada
          class="
            catalogo-v2-description
          "
        >
          {{ description }}
        </p>

        <div
          class="
            catalogo-v2-badges
          "
        >
          {{ badges }}
        </div>

        <a
          produto-camada
          href="{{ href }}"
          class="
            catalogo-v2-cta
          "
        >
          <div>
            <span
              class="
                catalogo-v2-price-label
              "
            >
              A partir de
            </span>

            <strong
              class="
                catalogo-v2-price-value
              "
            >
              R$ {{ preco }}
            </strong>
          </div>

          <span
            class="
              divider divider-horizontal
            "
          >
          </span>

          <span
            class="
              catalogo-v2-cta-label
            "
          >
            <i
              class="
                ti ti-shopping-bag
              "
            >
            </i>
            Encomendar
          </span>
        </a>
      </div>
    </div>
  </article>
</section>
