
<section 
  produto-secao
  class="
    h-full w-full snap-start grid grid-cols-[55%_45%] 
    "
  >
  <div
  produto-imagem
    class="
      relative overflow-hidden
    "
  >
    <img
      produto-imagem-fundo
      src="{{ image-src }}"
      alt="{{ title }}"
      loading="lazy"
      class="
        h-full w-full object-cover object-center
        origin-center will-change-transform
        transition-transform duration-700 ease-out
      "
    />
  </div>

  <div 
    produto-descricao
    class="
      p-8 md:p-20 text-left h-full flex flex-col
      "
  >
    <h1 
      produto-camada
      class="
        text-6xl font-parisienne font-normal mb-6 text-shadow-lg text-shadow-accent/30
        opacity-0 translate-y-4
        transition-all duration-900 delay-150 ease-[cubic-bezier(0.16,1,0.3,1)]
        motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      {{ title }}
    </h1>
    <p 
      produto-camada
      class="
        font-light mb-6
        opacity-0 translate-y-4
        transition-all duration-900 delay-150 ease-[cubic-bezier(0.16,1,0.3,1)]
        motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      {{ description }}
    </p>
    <span 
      produto-camada
      class="
        badge badge-soft badge-sm md:badge-md italic
        opacity-0 translate-y-4
        transition-all duration-900 delay-300 ease-[cubic-bezier(0.16,1,0.3,1)]
        motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      {{ badge }}
    </span>
    <div class="mb-10"></div>
    <a 
      produto-camada
      href="{{ href }}"
      class="
        mt-auto flex bg-base-200 w-min rounded-3xl shadow-lg flex-row items-center justify-center p-4 md:p-8
        opacity-0 translate-y-4
        transition-all duration-900 delay-500 ease-[cubic-bezier(0.16,1,0.3,1)]
        motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      <div class="">
        <span class="text-xs uppercase tracking-[0.16em] text-base-content/70 text-nowrap">A partir de</span>
        <strong class="mt-1 md:text-3xl font-semibold leading-none text-base-content text-nowrap">
          R$ {{ preco }}
        </strong>
      </div>

      <div class="divider divider-horizontal"></div>

      <div class="md:text-lg text-nowrap">
        <i class="ti ti-shopping-bag"></i>
        Encomendar
      </div>
    </a>
  </div>
</section>
