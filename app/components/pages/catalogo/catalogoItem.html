<section
  produto-secao
  class="
    grid h-full min-h-full w-full snap-start
    grid-rows-[minmax(0,1fr)_auto]
    landscape:grid-rows-1 landscape:grid-cols-[55%_45%]
  "
>
  <div
    produto-imagem
    class="
      relative h-full min-h-0 overflow-hidden
    "
  >
    <img
      produto-imagem-fundo
      src="{{ image-src }}"
      alt="{{ title }}"
      loading="lazy"
      class="
        h-full w-full object-cover object-center
        origin-center will-change-transform
        transition-transform duration-700 ease-out
      "
    />
  </div>

  <div
    produto-descricao
    class="
      flex h-auto flex-col text-left box-border
      p-5 sm:p-6 md:p-10 lg:p-14 xl:p-16
      my-10
    "
  >
    <h1
      produto-camada
      class="
        text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-libre-baskerville font-normal tracking-tighter
        mb-4 md:mb-6
        opacity-0 translate-y-4
        transition-all duration-900 delay-150 ease-[cubic-bezier(0.16,1,0.3,1)] motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      {{ title }}
    </h1>

    <p
      produto-camada
      class="
        text-sm sm:text-base md:text-lg leading-relaxed font-light
        mb-4 md:mb-6
        opacity-0 translate-y-4
        transition-all duration-900 delay-150 ease-[cubic-bezier(0.16,1,0.3,1)] motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      {{ description }}
    </p>
    
    <div>
      {{ badges }}
    </div>

    <div
      class="
        mb-4 md:mb-6 lg:mb-8
      "
    >
    </div>

    <div
      produto-camada
      class="
        mt-auto flex w-full flex-row items-end  justify-between gap-4
        opacity-0 translate-y-4
        transition-all duration-900 delay-700 ease-[cubic-bezier(0.16,1,0.3,1)] motion-reduce:transition-none motion-reduce:transform-none
      "
    >
      <div>
        <span
          class="
            text-[10px] sm:text-xs uppercase tracking-[0.16em] text-nowrap
            text-base-content/70
          "
        >
          A partir de
        </span>

        <strong
          class="
            mt-1 block text-xl sm:text-2xl md:text-3xl font-semibold leading-none text-nowrap
            text-base-content
          "
        >
          R$ {{ preco }}
        </strong>
      </div>

      <a
        href="{{ href }}"
        class="
          btn btn-primary
          btn-sm md:btn-xl
          text-nowrap
        "
      >
        <i
          class="
            ti ti-shopping-bag
          "
        >
        </i>
        Encomendar
      </a>
    </div>
  </div>
</section>
