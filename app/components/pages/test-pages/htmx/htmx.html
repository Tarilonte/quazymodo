<section class="flex flex-col justify-center items-center grow w-full p-20 bg-base-100 min-h-[calc(100%_-_72px)]">
  <button
    id="htmx_test_button"
    class='btn btn-primary btn-lg m-20 mx-auto relative' 
    hx-get='/test/htmx?teste' 
    hx-select="#main_swap"
    hx-trigger='click once'
    hx-target='#target'
    hx-swap='innerHTML'
    hx-sync="this"
  >
    Me aperte 🥹<br>
    <div class="htmx-indicator absolute bg-primary h-full w-full rounded-xl flex justify-center">
      <span class="loading loading-dots loading-xl"></span>
    </div>
  </button>
  
  <div 
    id="target" 
    class="grow max-h-20"
  ></div>
  
</section>
