<main class="min-h-dvh flex items-center justify-center p-6">
  <section class="w-full max-w-md bg-base-100 rounded-lg shadow-md p-6 grid gap-5">
    <header class="grid gap-1">
      <h1 class="text-2xl font-semibold">Cadastro RedBean</h1>
      <p class="text-sm opacity-70">Salva nome e e-mail no SQLite.</p>
    </header>

    <div class="{{ message-type }}">
      {{ message }}
    </div>

    <form method="post" action="/test/redbean" class="grid gap-4">
      <label class="input input-bordered flex items-center gap-2">
        <span class="mdi mdi-account text-xl opacity-55"></span>
        <input
          type="text"
          name="name"
          placeholder="Nome"
          value="{{ name-value }}"
          required
        />
      </label>

      <label class="input input-bordered flex items-center gap-2">
        <span class="mdi mdi-email text-xl opacity-55"></span>
        <input
          type="email"
          name="email"
          placeholder="E-mail"
          value="{{ email-value }}"
          required
        />
      </label>

      <button class="btn btn-primary">Salvar</button>
    </form>
  </section>
</main>
