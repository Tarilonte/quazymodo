<div class="grid gap-5 w-full">
  <!-- Endereço -->
  <label class="input w-full">
    <input
      id="address"
      name="address"
      type="text"
      placeholder="Endereço"
      value="{{ address }}"
      required
    />
  </label>

  <!-- Número -->
  <label class="input w-full">
    <input
      id="number"
      name="number"
      type="text"
      placeholder="Número"
      value="{{ number }}"
      required
    />
  </label>

  <!-- Complemento -->
  <label class="input w-full">
    <input
      id="complement"
      name="complement"
      type="text"
      placeholder="Complemento"
      value="{{ complement }}"
    />
  </label>

  <!-- Bairro -->
  <label class="input w-full">
    <input
      id="district"
      name="district"
      type="text"
      placeholder="Bairro"
      value="{{ district }}"
      required
    />
  </label>

  <!-- Cidade -->
  <label class="input w-full">
    <input
      id="city"
      name="city"
      type="text"
      placeholder="Cidade"
      value="{{ city }}"
      required
    />
  </label>

  <!-- UF -->
  <label class="input w-full">
    <input
      id="uf"
      name="uf"
      type="text"
      placeholder="UF"
      value="{{ uf }}"
      maxlength="2"
      required
    />
  </label>
</div>
