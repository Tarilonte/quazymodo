<div class="flex grow justify-center items-center">
  <span id="hack" class=""></span>

  <form
    id="address-form"
    class="grid columns-1 justify-items-center bg-base-100 gap-5 p-6 md:p-16 rounded-lg md:shadow-md"
    hx-post="/address/submit"
    hx-target="#hack"
    hx-sync="this"
  >

    <input type="hidden" name="csrf-token" value="{{ csrf-token }}">

    <h1 class="text-2xl md:text-3xl font-rubik font-semibold">
      Endereço
    </h1>

    <!-- CEP + botão -->
    <div class="flex gap-2 w-full">
      <label class="input flex-1">
        <input
          id="cep"
          name="cep"
          type="text"
          placeholder="CEP"
          maxlength="9"
          required
        />
      </label>

      <button
        type="button"
        id="validate-cep"
        class="btn btn-primary"
        hx-post="/User/validateCEP"
        hx-include="#cep"
        hx-target="#address-fields"
      >
        Validar
      </button>
    </div>

    <div id="address-fields" class="grid gap-5 w-full">
      <!-- Endereço -->
      <label class="input w-full">
        <input
          id="address"
          name="address"
          type="text"
          placeholder="Endereço"
          required
        />
      </label>

      <!-- Número -->
      <label class="input w-full">
        <input
          id="number"
          name="number"
          type="text"
          placeholder="Número"
          required
        />
      </label>

      <!-- Complemento -->
      <label class="input w-full">
        <input
          id="complement"
          name="complement"
          type="text"
          placeholder="Complemento"
        />
      </label>

      <!-- Cidade -->
      <label class="input w-full">
        <input
          id="city"
          name="city"
          type="text"
          placeholder="Cidade"
          required
        />
      </label>

      <!-- UF -->
      <label class="input w-full">
        <input
          id="uf"
          name="uf"
          type="text"
          placeholder="UF"
          maxlength="2"
          required
        />
      </label>
    </div>

    <!-- Enviar -->
    <button class="btn btn-lg btn-primary w-full">
      Salvar endereço
      <div class="htmx-indicator absolute bg-primary h-full w-full flex justify-center rounded-xl">
        <span class="loading loading-dots loading-xl"></span>
      </div>
    </button>

  </form>
</div>
