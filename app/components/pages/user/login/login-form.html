<div class="flex grow justify-center items-center">
  <span id="hack" class="hidden"></span>
  <form 
    id="login-form"
    class="grid columns-1 justify-items-center bg-base-100 gap-7 p-6 md:p-16 rounded-lg md:shadow-md" 
    hx-post="/User/processLoginForm"
    hx-target="#hack"
    hx-sync="this"
    >

    <input type="hidden" name="csrf-token" value="{{ csrf-token }}">
    {{ site-logo }}
    <h1 class="text-2xl md:text-3xl font-rubik font-semibold">Entrar no Quazymodo</h1>

    <span class="hidden">
      {{ login-terceiros }}
      <div class="divider m-0">Ou</div>
    </span>

    <label class="input">
      <span class="mdi mdi-email text-xl opacity-55"></span>
      <input 
        name="email"
        type="email" 
        placeholder="seu e-mail" 
        required
        />
    </label>  

    <label class="input"> 
      <span class="mdi mdi-key-variant text-xl opacity-55"></span>
      <input 
        name="password"
        class="pw-input mr-8"
        required 
        type="password" 
        placeholder="Password" 
        minlength="8" 
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
        title="Must be more than 8 characters, including number, lowercase letter, uppercase letter"
      
      />
      <label class="pw-viewer swap text-2xl absolute right-2 cursor-pointer rounded-lg w-8 text-center">
        <span class="ti ti-eye-closed mt-2 swap-off"></span>
        <span class="mdi mdi-eye-outline swap-on"></span>
      </label>
    </label>

    <button id="submit-btn" class="btn btn-lg btn-loading btn-primary text-xl relative">
      Entrar
      <div class="htmx-indicator absolute bg-inherit h-[90%] w-[90%] flex justify-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
    </button>

    <span class="leading-loose text-sm">
      <span class="flex justify-center">
        <a href="" class="ml-1 underline startReset">Esqueceu a senha?</a>
      </span>
  
      <span class="flex justify-center">
        Não tem uma conta?
        <a href="/register" class="ml-1 underline">Registre-se</a>
      </span>
    </span>

  </form>
</div>
