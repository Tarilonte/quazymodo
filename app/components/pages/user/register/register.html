<div class="flex grow justify-center items-center">
  <span id="hack" class="hidden"></span>
  <form 
    id="register-form"
    class="grid columns-1 justify-items-center bg-base-100 gap-7 p-6 md:p-16 rounded-lg md:shadow-md" 
    hx-post="/User/processRegistrationForm"
    hx-target="#hack"
    hx-sync="this:drop"
    >

    <input type="hidden" name="csrf-token" value="{{ csrf-token }}">
    {{ site-logo }}
    <h1 class="text-2xl md:text-3xl font-rubik font-semibold">Criar Conta no Quazymodo</h1>

    <label class="input">
      <span class="mdi mdi-account text-xl opacity-55"></span>
      <input type="text" name="name" placeholder="Seu nome" required/>
    </label>  

    <label class="input">
      <span class="mdi mdi-email text-xl opacity-55"></span>
      <input type="email" name="email" placeholder="Seu e-mail" required/>
    </label>  

    <label class="input"> 
      <span class="mdi mdi-key-variant text-xl opacity-55"></span>
      <input 
        name="password"
        class="pw-input"
        required 
        type="password" 
        placeholder="Senha" 
        minlength="8" 
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
        title="Deve ter mais de 8 caracteres, incluindo número, letra minúscula e maiúscula"
      />
      <label class="pw-viewer swap text-2xl absolute right-2 cursor-pointer rounded-lg w-8 text-center">
        <span class="ti ti-eye-closed mt-2 swap-off"></span>
        <span class="mdi mdi-eye-outline swap-on"></span>
      </label>
    </label>

    <label class="input"> 
      <span class="mdi mdi-key-variant text-xl opacity-55"></span>
      <input 
        name="password_confirmation"
        class="pw-input"
        required 
        type="password" 
        placeholder="Confirme a Senha" 
        minlength="8"
      />
      <label class="pw-viewer swap text-2xl absolute right-2 cursor-pointer rounded-lg w-8 text-center">
        <span class="ti ti-eye-closed mt-2 swap-off"></span>
        <span class="mdi mdi-eye-outline swap-on"></span>
      </label>
    </label>

    <button id="submit-btn" class="btn btn-lg btn-loading btn-primary text-xl relative">
      Registrar
      <div class="htmx-indicator absolute bg-primary h-full w-full rounded flex justify-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
    </button>

    <span class="leading-loose text-sm">
      <span class="flex justify-center">
        Já tem uma conta?
        <a href="/login" class="ml-1 underline">Entrar</a>
      </span>
    </span>

  </form>
</div>
