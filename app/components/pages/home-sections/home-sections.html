<!--
  Home sections full-screen layout.
  Intencao: cada secao ocupa 100% da viewport com fundo diferente.
-->
<main class="w-full h-dvh overflow-y-auto snap-y snap-mandatory" data-home-sections-container>
  <!-- Secao 1 -->
  <section class="hero relative min-h-dvh w-full snap-start overflow-hidden bg-red-500 text-white" data-home-section>
    <img
      src="/assets/pages/home-sections/hero-1.jpg"
      alt=""
      aria-hidden="true"
      loading="lazy"
      class="pointer-events-none absolute inset-0 h-full w-full object-cover"
      data-home-section-image
    />
    <div class="hero-overlay bg-black/35"></div>
    <div class="hero-content relative text-center">
      <h1 class="text-8xl sm:text-[8rem] font-thin tracking-wide drop-shadow-[0_10px_28px_rgba(0,0,0,0.45)]">Sessao 1</h1>
    </div>
  </section>
