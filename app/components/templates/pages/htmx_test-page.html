<section class="flex flex-col justify-center items-center grow w-full p-20 bg-base-100 min-h-[calc(100%_-_72px)]">
  <button 
    id="htmx_test_button"
    class='btn btn-primary btn-lg m-20 mx-auto relative' 
    hx-get='/test/htmx?teste' 
    hx-select="#main_swap"
    hx-trigger='click'
    hx-target='#target'
    hx-swap='innerHTML'
    hx-sync="this:drop"
  >
    Click me please, don't be afraid!<br>
    <div class="htmx-indicator absolute bg-primary h-[90%] w-[90%] flex justify-center">
      <span class="loading loading-dots loading-xl"></span>
    </div>
  </button>
  
  <div 
    id="target" 
    class="grow max-h-20"
  ></div>

  <div 
    id="toast_container"
    class="toast mb-20"
    hx-get="htmx?teste" 
    hx-select=".alert"
    hx-swap="beforeend"
    hx-trigger="every 3s"
  ></div>
  
</section>

<script nonce="{{nonce}}">
    document.addEventListener("htmx:afterSwap", (e) => {
    if (e.detail.target.id === "toast_container") {
      const toast = e.detail.target.lastElementChild;
      setTimeout(() => {
        $(toast).fadeOut(700, function() {
          $(this).remove();
        });
      }, 7000);
    }
  });
</script>
