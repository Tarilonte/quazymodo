# Redirect HTTP to HTTPS
server {
    listen 80;
    # Respond to both names
    server_name quazymodo localhost;
    # Redirect to the standard HTTPS port (443)
    return 301 https://$host:8443$request_uri;
}

# HTTPS server configuration
server {
    listen 443 ssl http2; # Listen on 443 for SSL connections
    # Respond to both names
    server_name quazymodo localhost;
    root /var/www/html/public;
    index index.php;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/server.crt; # Path to SSL certificate inside the container
    ssl_certificate_key /etc/nginx/ssl/server.key; # Path to SSL private key inside the container

    # Add recommended SSL settings (optional but good practice)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # Add HSTS header (optional but recommended for security)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Assets handling - Give this priority with ^~
    location ^~ /assets/ {
        alias /var/www/html/app/components/assets/;
        autoindex off;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Add HTTPS param for PHP
        fastcgi_param HTTPS on;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }

    # Static files optimization - Make this less specific than /assets/
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}