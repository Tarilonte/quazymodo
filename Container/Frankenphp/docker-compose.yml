version: '3'

services:
  frankenphp:
    build:
      context: .
      dockerfile: Container/Frankenphp/Dockerfile
    ports:
      - "80:80"
    volumes:
      - .:/app
    environment:
      - APP_ENV=development
      - FRANKENPHP_CONFIG="worker_count=3"
    depends_on:
      - database
    restart: unless-stopped

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quazymodo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data: