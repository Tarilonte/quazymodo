version: '3'

services:
  frankenphp:
    build:
      # Context should be the project root, relative to this compose file's location
      context: ../.. 
      # Dockerfile path relative to the new context (project root)
      dockerfile: ./Container/Frankenphp/Dockerfile 
    ports:
      # Map host port 8080 to container port 80
      - "8080:80" 
    volumes:
      # Mount the project root (context) into /app
      - ../..:/app 
    environment:
      - APP_ENV=development
    restart: unless-stopped